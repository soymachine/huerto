name: Keep Supabase alive

on:
  schedule:
    - cron: '0 8 * * *' # cada día a las 8:00 UTC
  workflow_dispatch: # permite lanzarlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.PUBLIC_SUPABASE_URL }}/rest/v1/gardens?select=id&limit=1" \
            -H "apikey: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Unexpected status code $STATUS"
            exit 1
          fi
